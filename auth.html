<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Premium Detailing | Вход</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Подключение конфигурации Supabase -->
    <script src="./js/supabaseClient.js"></script>
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="dark-theme">
  <div class="back-button-container">
        <button class="back-button" onclick="goToMainPage()" aria-label="На главную">
            <i class="fas fa-arrow-left"></i>
            <span>На главную</span>
           
        </button>
        <button class="back-button" onclick="goToMainPage()" aria-label="На главную">
            <i class="fas fa-arrow-left"></i>
        
            <span><a href="./q1.html">111</a></span>
        </button>
    </div>
    <!-- Переключатель темы -->
    <div class="theme-toggle">
        <button id="themeSwitcher" aria-label="Переключить тему">
            <i class="fas fa-moon"></i>
        </button>
    </div>
    <!-- Кнопка входа в админ-панель -->
    <div class="admin-quick-login">
        <button class="admin-btn" onclick="quickAdminLogin()" aria-label="Вход для администратора">
            <i class="fas fa-crown"></i>
            <span>Админ</span>
        </button>
    </div>

    <!-- Фоновый элемент с эффектом автомобиля -->
    <div class="background-container">
        <div class="overlay"></div>
        <div class="light-beam"></div>
    </div>

    <div class="container">
        <div class="auth-card" id="authCard">
            <!-- Заголовок с логотипом -->
            <div class="brand">
                <div class="logo-glow">
                    <i class="fas fa-car"></i>
                </div>
                <h1>AUTOSTYLES</h1>
                <p class="brand-subtitle">Чистота. Блеск. Премиум.</p>
            </div>

            <!-- Переключатель Вход/Регистрация -->
            <div class="toggle-container">
                <button class="toggle-btn active" id="loginToggle">Вход</button>
                <button class="toggle-btn" id="registerToggle">Регистрация</button>
                <div class="toggle-slider" id="toggleSlider"></div>
            </div>

            <!-- Форма входа -->
            <div class="auth-form active" id="loginForm">
                <h2>Добро пожаловать</h2>
                
                <div class="social-login">
                    <button class="social-btn google-btn" id="googleLogin">
                        <i class="fab fa-google"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn apple-btn" id="appleLogin">
                        <i class="fab fa-apple"></i>
                        <span>Apple</span>
                    </button>
                </div>

                <div class="divider">
                    <span>или</span>
                </div>

                <form id="loginFormElement" novalidate>
                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="loginEmail" placeholder=" " required>
                            <label for="loginEmail">Email или телефон</label>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="loginEmailError"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginPassword" placeholder=" " required>
                            <label for="loginPassword">Пароль</label>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                                <i class="far fa-eye"></i>
                            </button>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="loginPasswordError"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Запомнить меня</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgotPassword">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="loginSubmit">
                        <span>Войти</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <!-- Форма регистрации -->
            <div class="auth-form" id="registerForm">
                <h2>Создать аккаунт</h2>
                
                <form id="registerFormElement" novalidate>
                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="registerName" placeholder=" " required>
                            <label for="registerName">Имя</label>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="registerNameError"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-phone input-icon"></i>
                            <input type="tel" id="registerPhone" placeholder=" " class="phone-mask" required>
                            <label for="registerPhone">Телефон</label>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="registerPhoneError"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="registerEmail" placeholder=" " required>
                            <label for="registerEmail">Email</label>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="registerEmailError"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="registerPassword" placeholder=" " required>
                            <label for="registerPassword">Пароль</label>
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">
                                <i class="far fa-eye"></i>
                            </button>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                        <div class="error-message" id="registerPasswordError"></div>
                    </div>

                    <div class="input-group">
                        <div class="input-field">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="registerConfirmPassword" placeholder=" " required>
                            <label for="registerConfirmPassword">Подтвердите пароль</label>
                            <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword', this)">
                                <i class="far fa-eye"></i>
                            </button>
                            <div class="input-highlight"></div>
                        </div>
                        <div class="error-message" id="registerConfirmError"></div>
                    </div>

                    <!-- Добавление автомобиля при регистрации -->
                    <div class="car-section" id="carSection">
                        <div class="car-toggle">
                            <button type="button" class="car-toggle-btn" id="addCarBtn">
                                <i class="fas fa-plus"></i>
                                <span>Добавить автомобиль</span>
                            </button>
                        </div>
                        
                        <div class="car-fields" id="carFields">
                            <div class="input-group">
                                <div class="input-field">
                                    <i class="fas fa-car input-icon"></i>
                                    <input type="text" id="carBrand" placeholder=" ">
                                    <label for="carBrand">Марка</label>
                                    <div class="input-highlight"></div>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="input-field">
                                    <i class="fas fa-car-side input-icon"></i>
                                    <input type="text" id="carModel" placeholder=" ">
                                    <label for="carModel">Модель</label>
                                    <div class="input-highlight"></div>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="input-field">
                                    <i class="fas fa-calendar input-icon"></i>
                                    <input type="number" id="carYear" placeholder=" " min="1900" max="2025">
                                    <label for="carYear">Год выпуска</label>
                                    <div class="input-highlight"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="privacyPolicy" required>
                            <span class="checkmark"></span>
                            <span class="checkbox-text">Я согласен с <a href="#" class="policy-link">политикой конфиденциальности</a></span>
                        </label>
                        <div class="error-message" id="privacyError"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="registerSubmit">
                        <span>Зарегистрироваться</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Модальное окно для записи на услугу -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Запись на услугу</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p>Хотите записаться на детейлинг?</p>
                <div class="modal-actions">
                    <button class="modal-btn secondary" onclick="closeModal()">Позже</button>
                    <button class="modal-btn primary" onclick="redirectToBooking()">Записаться</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Основной скрипт -->
    <script src="./js/auth.js"></script>
</body>
</html>
